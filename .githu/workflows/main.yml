name: MarketBot
on:
  schedule:
    - cron: '0 * * * *' # هر یک ساعت یک‌بار اجرا شود
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Python Script
        run: |
          pip install requests
          python bot.py
      - name: Save Changes
        run: |
          git config --global user.name 'Market-Bot'
          git config --global user.email 'bot@github.com'
          git add market_data.json
          git commit -m "Update Market Data" || exit 0
          git push
