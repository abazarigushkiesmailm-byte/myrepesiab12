<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Station Pro | Elite v6 (Fullscreen Edition)</title>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b121a;
            --bg-card: rgba(1, 17, 66, 0.98);
            --border-color: #300026;
            --accent-color: #1255ff;
            --text-primary: #f5f562;
            --success: #00fe04;
            --danger: #f30814;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: Arial, Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* استایل حالت تمام صفحه */
        body:fullscreen .top-widget-bar { display: none; }
        body:fullscreen #chart-container { height: 100vh; }

        .top-widget-bar {
            width: 100%;
            background: #111417;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .main-content {
            display: flex;
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        #chart-container {
            flex-grow: 1;
            position: relative;
            direction: ltr;
            width: 100%;
            height: 100%;
        }

        /* کانتینر جدید در سمت چپ بالا */
        .chart-overlay-info {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 110;
            background: var(--bg-card);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            direction: ltr;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            pointer-events: auto;
        }

        .price-display-group {
            display: flex;
            flex-direction: column;
            text-align: left;
            min-width: 100px;
        }

        .overlay-symbol { font-size: 1rem; font-weight: bold; color: var(--accent-color); }
        .overlay-price { font-size: 1.3rem; font-family: Arial; font-weight: bold; color: #fff; }

        .left-action-buttons {
            display: flex;
            gap: 8px;
            border-left: 1px solid rgba(255,255,255,0.1);
            padding-left: 12px;
        }

        .control-btn {
            background: var(--accent-color);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            border: none;
            transition: 0.2s;
        }

        .control-btn:hover { transform: scale(1.1); filter: brightness(1.2); }

        .drawer {
            position: absolute;
            top: 85px;
            left: 15px;
            z-index: 120;
            background: var(--bg-card);
            width: 300px;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid var(--accent-color);
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-height: 75vh;
            overflow-y: auto;
            direction: rtl;
        }

        .drawer.active { display: flex; }

        /* سایر استایل‌های جداول و المان‌ها */
        #coin-drawer { height: 500px; direction: ltr; }
        .coin-list-container { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .asset-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .asset-table tr { border-bottom: 1px solid #1c1f24; cursor: pointer; }
        .asset-table tr:hover { background: #006108; }
        .asset-table td { padding: 10px 5px; text-align: left; color: #e1fa01f0; }
        .coin-cell { display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--accent-color); }
        .coin-cell img { width: 20px; height: 20px; border-radius: 50%; }

        input, button, select {
            background: #000; color: #41f206; border: 1px solid var(--border-color);
            padding: 8px; border-radius: 8px; width: 100%; font-size: 0.9rem; margin-bottom: 5px;
        }

        .section-label {
            font-size: 0.75rem; color: var(--accent-color); font-weight: bold;
            margin: 10px 0 8px; border-bottom: 1px solid #6d005b;
        }

        .color-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.75rem; margin-bottom: 8px; }
        .cp { width: 30px !important; height: 22px; padding: 0; border: none; cursor: pointer; }
        .draw-active { background: var(--danger) !important; color: #fff; border-color: #fff !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }
    </style>
</head>

<body>
    <div class="top-widget-bar">
        <div id="coinmarketcap-widget-marquee" coins="1,1027,825,1839,5426,74,52,2010" currency="USD" theme="dark" transparent="true" show-symbol-logo="true"></div>
        <script type="text/javascript" src="https://files.coinmarketcap.com/static/widget/coinMarquee.js"></script>
    </div>

    <div class="main-content">
        <div id="chart-container">
            <div class="chart-overlay-info">
                <div class="price-display-group">
                    <span id="overlay-sym" class="overlay-symbol">BTC/USDT</span>
                    <span id="overlay-price" class="overlay-price">0.00</span>
                    <div id="overlay-change" style="font-size: 0.85rem; font-family: Arial;">0.00%</div>
                </div>
                
                <div class="left-action-buttons">
                    <button class="control-btn" onclick="toggleDrawer('settings-drawer')" title="Settings"><i class="fas fa-cog"></i></button>
                    <button class="control-btn" onclick="toggleDrawer('coin-drawer')" title="Coin List"><i class="fas fa-list"></i></button>
                    <button class="control-btn" id="fs-btn" onclick="toggleFullScreen()" title="Fullscreen"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>

        <div id="settings-drawer" class="drawer">
            <div class="section-label">Symbol Search</div>
            <input type="text" id="search-input" placeholder="BTC..." onkeydown="if(event.key==='Enter') updateSymbol(this.value.toUpperCase())">
            <select id="tf-select" onchange="changeTF(this.value)">
                <option value="15m">15m</option>
                <option value="1h">1h</option>
                <option value="4h">4h</option>
                <option value="1d" selected>1d</option>
                <option value="1w">1w</option>
            </select>

            <div class="section-label">Indicators</div>
            <label style="font-size: 0.7rem;"><input type="checkbox" id="show-bb" onchange="updateVisibility()"> Bollinger Bands</label>
            <label style="font-size: 0.7rem;"><input type="checkbox" id="show-rsi" onchange="updateVisibility()"> RSI (14)</label>

            <div class="section-label">Drawing Tools</div>
            <div class="color-row">Line Color: <input type="color" id="draw-color" value="#f0b90b" class="cp"></div>
            <button id="draw-btn" onclick="toggleDrawingMode()">Enable Draw</button>
            <button onclick="undoLastLine()">Undo Last</button>
            <button onclick="clearLines()" style="color: var(--danger)">Clear All</button>

            <div class="section-label">EMA Styles</div>
            <div class="color-row">EMA 7 <input type="color" id="c7" value="#FFD700" class="cp" onchange="updateEMAStyle()"></div>
            <div class="color-row">EMA 30 <input type="color" id="c30" value="#E040FB" class="cp" onchange="updateEMAStyle()"></div>
            <div class="color-row">EMA 200 <input type="color" id="c200" value="#FFFFFF" class="cp" onchange="updateEMAStyle()"></div>
        </div>

        <div id="coin-drawer" class="drawer">
            <div class="section-label" style="text-align: center;">TOP 100 COINS</div>
            <div class="coin-list-container">
                <table class="asset-table"><tbody id="top-coins-list"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        let chart, candleSeries, volumeSeries, ema7, ema30, ema200, socket;
        let bbUpper, bbMiddle, bbLower, rsiSeries;
        let currentSymbol = 'BTCUSDT', currentInterval = '1d', activeLines = [], isDrawingEnabled = false;

        function toggleDrawer(id) {
            const drawer = document.getElementById(id);
            const isActive = drawer.classList.contains('active');
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('active'));
            if (!isActive) drawer.classList.add('active');
        }

        // --- FULLSCREEN LOGIC ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                document.getElementById('fs-btn').innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    document.getElementById('fs-btn').innerHTML = '<i class="fas fa-expand"></i>';
                }
            }
        }

        document.addEventListener('fullscreenchange', () => {
            setTimeout(() => {
                const container = document.getElementById('chart-container');
                if(chart) chart.resize(container.clientWidth, container.clientHeight);
            }, 150);
        });

        function initChart() {
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                layout: { backgroundColor: '#0b121a', textColor: '#d1d4dc' },
                localization: {
                    locale: 'en-US',
                    priceFormatter: price => { if (price ===undefined || price === null) return '';
                    return price.toFixed(2).replace(/[.-۹]/g,d=>({'.':'٫','-':'−','0':'۰','1':'۱','2':'۲','3':'۳','4':'۴','5':'۵','6':'۶','7':'۷','8':'۸','9':'۹'}[d])); }
                },

                grid: { vertLines: { color: '#16191e' }, horzLines: { color: '#16191e' } },
                timeScale: { timeVisible: true, borderVisible: false },
                rightPriceScale: { borderVisible: false, autoScale: true },
                width: container.clientWidth,
                height: container.clientHeight
            });


            candleSeries = chart.addCandlestickSeries({ upColor: '#16c784', downColor: '#ea3943', borderVisible: false, wickUpColor: '#16c784', wickDownColor: '#ea3943' });

            candleSeries = chart.addCandlestickSeries({ upColor: '#16c784', downColor: '#ea3943', borderVisible: false, wickUpColor: '#16c784', wickDownColor: '#ea3943' });
            volumeSeries = chart.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '', scaleMargins: { top: 0.8, bottom: 0 } });

            ema7 = chart.addLineSeries({ color: '#FFD700', lineWidth: 1, priceLineVisible: false });
            ema30 = chart.addLineSeries({ color: '#E040FB', lineWidth: 1, priceLineVisible: false });
            ema200 = chart.addLineSeries({ color: '#FFFFFF', lineWidth: 2, priceLineVisible: false });

            bbUpper = chart.addLineSeries({ color: 'rgba(33, 150, 243, 0.7)', lineWidth: 1, priceLineVisible: false, visible: false });
            bbMiddle = chart.addLineSeries({ color: 'rgba(33, 150, 243, 0.4)', lineWidth: 1, priceLineVisible: false, lineStyle: 2, visible: false });
            bbLower = chart.addLineSeries({ color: 'rgba(33, 150, 243, 0.7)', lineWidth: 1, priceLineVisible: false, visible: false });

            rsiSeries = chart.addLineSeries({ color: '#ff9800', lineWidth: 1.5, priceScaleId: 'rsi-scale', visible: false });
            chart.priceScale('rsi-scale').applyOptions({ scaleMargins: { top: 0.75, bottom: 0.05 }, borderVisible: true });

            chart.subscribeClick(p => {
                if (isDrawingEnabled && p.point) {
                    const price = candleSeries.coordinateToPrice(p.point.y);
                    if (price) addLine(price, true);
                }
            });

            window.addEventListener('resize', () => chart.resize(container.clientWidth, container.clientHeight));
            loadTopVolumeCoins();
            updateSymbol('BTCUSDT');
        }

        async function updateSymbol(symbol) {
            if (!symbol.endsWith('USDT')) symbol += 'USDT';
            currentSymbol = symbol;
            document.getElementById('overlay-sym').innerText = symbol;
            if (socket) socket.close();
            activeLines.forEach(l => candleSeries.removePriceLine(l.obj));
            activeLines = []; loadSavedLines();

            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${currentInterval}&limit=500`);
                const raw = await res.json();
                const processedData = raw.map(d => ({ time: d[0] / 1000, open: +d[1], high: +d[2], low: +d[3], close: +d[4], vol: +d[5] }));

                candleSeries.setData(processedData);
                volumeSeries.setData(processedData.map(d => ({ time: d.time, value: d.vol, color: d.close >= d.open ? '#16c78444' : '#ea394344' })));
                ema7.setData(calcEMA(processedData, 7));
                ema30.setData(calcEMA(processedData, 30));
                ema200.setData(calcEMA(processedData, 200));
                const bb = calcBB(processedData, 20, 2);
                bbUpper.setData(bb.upper); bbMiddle.setData(bb.middle); bbLower.setData(bb.lower);
                rsiSeries.setData(calcRSI(processedData, 14));
                chart.timeScale().fitContent();

                socket = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@kline_${currentInterval}`);
                socket.onmessage = e => {
                    const k = JSON.parse(e.data).k;
                    const price = parseFloat(k.c);
                    const open = parseFloat(k.o);
                    const change = ((price - open) / open * 100).toFixed(2);
                    document.getElementById('overlay-price').innerText = price.toLocaleString('en-US', { minimumFractionDigits: 2 });
                    document.getElementById('overlay-price').style.color = price >= open ? 'var(--success)' : 'var(--danger)';
                    document.getElementById('overlay-change').innerText = (change >= 0 ? '+' : '') + change + '%';
                    document.getElementById('overlay-change').style.color = change >= 0 ? 'var(--success)' : 'var(--danger)';
                    candleSeries.update({ time: k.t / 1000, open: +k.o, high: +k.h, low: +k.l, close: +k.c });
                };
            } catch (err) {}
        }

        const calcEMA = (data, p) => { let k = 2/(p+1); let ema = []; let prev = data[0].close; data.forEach(d => { let val = (d.close*k) + (prev*(1-k)); ema.push({time:d.time, value:val}); prev=val; }); return ema; };
        const calcBB = (data, p, s) => { let u=[], m=[], l=[]; for(let i=p-1; i<data.length; i++){ let slice = data.slice(i-p+1, i+1); let avg = slice.reduce((a,b)=>a+b.close,0)/p; let sd = Math.sqrt(slice.reduce((a,b)=>a+Math.pow(b.close-avg,2),0)/p); m.push({time:data[i].time, value:avg}); u.push({time:data[i].time, value:avg+(sd*s)}); l.push({time:data[i].time, value:avg-(sd*s)}); } return {upper:u, middle:m, lower:l}; };
        const calcRSI = (data, p) => { let rsi=[]; let g=0, l=0; for(let i=1; i<data.length; i++){ let d = data[i].close - data[i-1].close; if(i<=p){ if(d>0) g+=d; else l-=d; if(i===p){ rsi.push({time:data[i].time, value: 100-(100/(1+(g/l)))}); g/=p; l/=p; } } else { let curG = d>0?d:0; let curL = d<0?-d:0; g=(g*(p-1)+curG)/p; l=(l*(p-1)+curL)/p; rsi.push({time:data[i].time, value: 100-(100/(1+(g/l)))}); } } return rsi; };

        function updateEMAStyle() { ema7.applyOptions({color: document.getElementById('c7').value}); ema30.applyOptions({color: document.getElementById('c30').value}); ema200.applyOptions({color: document.getElementById('c200').value}); }
        function updateVisibility() { let bb = document.getElementById('show-bb').checked; let rsi = document.getElementById('show-rsi').checked; bbUpper.applyOptions({visible:bb}); bbMiddle.applyOptions({visible:bb}); bbLower.applyOptions({visible:bb}); rsiSeries.applyOptions({visible:rsi}); }
        
        async function loadTopVolumeCoins() { 
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr'); 
            const data = await res.json(); 
            const top = data.filter(i=>i.symbol.endsWith('USDT')).sort((a,b)=>b.quoteVolume-a.quoteVolume).slice(0,100); 
            document.getElementById('top-coins-list').innerHTML = top.map(c=>{ 
                const s=c.symbol.replace('USDT',''); const ch=parseFloat(c.priceChangePercent); 
                return `<tr onclick="updateSymbol('${c.symbol}'); toggleDrawer('coin-drawer');"><td class="coin-cell"><img src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${s.toLowerCase()}.png" onerror="this.src='https://via.placeholder.com/20'">${s}</td><td>${parseFloat(c.lastPrice).toLocaleString()}</td><td style="color:${ch>=0?'var(--success)':'var(--danger)'}">${ch}%</td></tr>`; 
            }).join(''); 
        }

        function addLine(p, s=true, c=null) { 
            const col = c || document.getElementById('draw-color').value; 
            const l = candleSeries.createPriceLine({price:p, color:col, lineWidth:2, lineStyle:2, title:p.toFixed(2).toString()}); 
            
            activeLines.push({obj:l, price:p, color:col}); 
            if(s) saveLines(); 
        }
        function saveLines() { localStorage.setItem(`drawings_${currentSymbol}`, JSON.stringify(activeLines.map(l=>({price:l.price, color:l.color})))); }
        function loadSavedLines() { const saved = localStorage.getItem(`drawings_${currentSymbol}`); if(saved) JSON.parse(saved).forEach(l=>addLine(l.price, false, l.color)); }
        function undoLastLine() { if(activeLines.length){ candleSeries.removePriceLine(activeLines.pop().obj); saveLines(); } }
        function clearLines() { activeLines.forEach(l=>candleSeries.removePriceLine(l.obj)); activeLines=[]; localStorage.removeItem(`drawings_${currentSymbol}`); }
        function toggleDrawingMode() { isDrawingEnabled=!isDrawingEnabled; let b=document.getElementById('draw-btn'); b.innerText=isDrawingEnabled?"Drawing Active":"Enable Draw"; b.classList.toggle('draw-active', isDrawingEnabled); }
        function changeTF(tf) { currentInterval=tf; updateSymbol(currentSymbol); }

        initChart();
        document.addEventListener('click', e => { 
            if(!e.target.closest('.drawer') && !e.target.closest('.control-btn') && !e.target.closest('.chart-overlay-info')) { 
                document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('active')); 
            } 
        });
    </script>
</body>
</html>
